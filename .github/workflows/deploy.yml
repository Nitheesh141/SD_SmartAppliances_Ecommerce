name: Deploy SD Smart Appliances

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            echo "========== Starting Deployment =========="

            cd /var/www/SD_SmartAppliances_Ecommerce

            echo "Fetching latest code..."
            git fetch origin
            git checkout main
            git reset --hard origin/main

            #################################################
            # Backend
            #################################################

            echo "Installing backend dependencies..."
            cd sd-smart-backend
            npm install

            echo "Generating Prisma Client..."
            npx prisma generate

            echo "Running Prisma Migrations..."
            npx prisma migrate deploy

            echo "Building Backend..."
            npm run build

            echo "Restarting Backend..."
            if pm2 describe sdsmart-backend >/dev/null; then
              pm2 restart sdsmart-backend
            else
              pm2 start dist/server.js --name sdsmart-backend
            fi

            #################################################
            # Frontend
            #################################################

            echo "Installing frontend dependencies..."
            cd ../sd-smart-frontend
            npm install

            echo "Building Frontend..."
            npm run build

            echo "Restarting Frontend..."
            if pm2 describe sdsmart-frontend >/dev/null; then
              pm2 restart sdsmart-frontend
            else
              pm2 serve dist 4173 --spa --name sdsmart-frontend
            fi

            #################################################
            # Save PM2
            #################################################

            pm2 save

            echo "========== Deployment Completed Successfully =========="
